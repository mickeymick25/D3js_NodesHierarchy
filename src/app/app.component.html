<div class="flex flex-col h-screen">
    <!-- Header -->
    <header
        class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 sm:py-4 shadow-sm"
    >
        <div
            class="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-4"
        >
            <h1 class="text-lg sm:text-xl font-bold text-gray-900 shrink-0">
                COP — Relation Graph
            </h1>
            <app-site-selector></app-site-selector>
            <app-layout-selector></app-layout-selector>
        </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 relative overflow-hidden">
        <app-graph
            [graphData]="graphData"
            [layoutMode]="layoutMode"
            class="absolute inset-0"
        ></app-graph>

        <!-- Legend overlay -->
        <div class="absolute bottom-4 left-4 z-10">
            <app-legend></app-legend>
        </div>
    </main>
</div>
